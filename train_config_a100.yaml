# ============================================================
# A100-Optimized GRPO Training Config v2
# ROUND 2: More steps, refined rewards, lower LR
# ============================================================

# Model
base_model: "unsloth/Qwen2.5-0.5B-Instruct"
max_seq_length: 1024
load_in_4bit: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
use_unsloth: true

# A100 Precision & Performance
precision: "bf16"
cpu_only: false
torch_compile: false

# Curriculum stages (bigger budget per stage)
curriculum:
  - stage: 1
    task_ids: ["basic_compliance"]
    steps: 50
    n_episodes_per_task: 30
  - stage: 2
    task_ids: ["aggressive_sustainability"]
    steps: 60
    n_episodes_per_task: 30
  - stage: 3
    task_ids: ["carbon_neutral_excellence"]
    steps: 40
    n_episodes_per_task: 30

# GRPO Settings (refined for round 2)
learning_rate: 8.0e-6
num_train_epochs: 1
max_steps: 150
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
num_generations: 6
max_new_tokens: 192
temperature: 0.7
top_p: 0.9
max_grad_norm: 0.8

# Logging & Checkpointing
logging_steps: 10
save_steps: 50
output_dir: "outputs/grpo_step_150_a100_v2"

# Dataset expansion
dataset_size: 350
dataset_strategy:
  heuristic_pct: 60
  random_pct: 25
  adversarial_pct: 15

# Reward adjustments (v2: heavier format + anti-cheat)
reward_weights:
  env_outcome: 0.45
  format_compliance: 0.25
  anti_cheat: 0.15
  task_progress: 0.05
  waste_boost: 0.05
  synergy_bonus: 0.05

# Smoke test
smoke_test: false
